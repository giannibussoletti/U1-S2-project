<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/normalize.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>Amazon Page Mockup - Gianni Bussoletti</title>
  </head>
  <body>
    <header id="head-scroll" class="top-site bg-color-hf">
      <div class="logo-header">
        <img src="./assets/images/logo.png" alt="logo Amazon" />
      </div>
      <nav class="secondary-bg-color list-nav-bar">
        <ul class="">
          <li>All</li>
          <li>Today's deals</li>
          <li>Customer Service</li>
          <li>Registry</li>
          <li>Gift Cards</li>
          <li>Sell</li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="content-wrap">
        <section class="orange-bg text-center">
          <p>Shop All Holiday Gift Cards</p>
        </section>
        <section class="holiday-guides text-center margin-div">
          <h2>Holiday Gift Guides</h2>
          <h3>Be a go-gifter</h3>
        </section>
        <section class="gift-wrap margin-div">
          <div class="perfect-gift inline-title">
            <h2>Find perfect-gift</h2>
            <h3>Shop now</h3>
          </div>
          <div class="img-perfect-gift">
            <div><img src="./assets/images/img_1.jpg" alt="kindle" /></div>
            <div><img src="./assets/images/img_2.jpg" alt="pc" /></div>
            <div><img src="./assets/images/img_3.jpg" alt="smartwatch" /></div>
            <div><img src="./assets/images/img_4.jpg" alt="animals" /></div>
          </div>
        </section>
        <section class="full-width-product margin-div">
          <img src="./assets/images/img_9.png" alt="" />
          <div class="inline-title text-center">
            <h2>Play the gifting game</h2>
            <h3>Shop gaming</h3>
          </div>
        </section>
        <section class="full-width-product margin-div">
          <img src="./assets/images/img_10.png" alt="" />
          <div class="inline-title text-center">
            <h2>The sound of cheer</h2>
            <h3>Shop Audio &amp; Accessories</h3>
          </div>
        </section>
      </div>
    </main>
    <footer>
      <div class="backtop text-center secondary-bg-color">
        <a href="#head-scroll">Back to top</a>
      </div>
      <div class="footer-wrap text-center bg-color-hf">
        <img src="./assets/images/logo.png" alt="logo Amazon" />
      </div>
    </footer>
  </body>
</html>

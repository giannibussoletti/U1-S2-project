<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/normalize.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>Amazon Page Mockup - Gianni Bussoletti</title>
  </head>
  <body>
    <header id="top-site">
      <div class="logo-header bg-color-hf">
        <img src="./assets/images/logo.png" alt="logo Amazon" />
      </div>
      <nav class="secondary-bg-color list-nav-bar">
        <ul class="">
          <li>All</li>
          <li>Today's deals</li>
          <li>Customer Service</li>
          <li>Registry</li>
          <li>Gift Cards</li>
          <li>Sell</li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="orange-bg text-center">
        <p>Shop All Holiday Gift Cards</p>
      </div>
      <div class="holiday-guides text-center">
        <h2>Holiday Gift Guides</h2>
        <h3>Be a go-gifter</h3>
      </div>
      <div id="gift-wrap">
        <div class="perfect-gift inline-title">
          <h2>Find perfect-gift</h2>
          <h3>Shop now</h3>
        </div>
        <div class="img-perfect-gift">
          <img src="./assets/images/img_1.jpg" alt="kindle" />
          <img src="./assets/images/img_2.jpg" alt="pc" />
          <img src="./assets/images/img_3.jpg" alt="smartwatch" />
          <img src="./assets/images/img_4.jpg" alt="animals" />
        </div>
      </div>
      <div class="full-width-product">
        <img src="./assets/images/img_9.png" alt="" />
        <div class="inline-title text-center">
          <h2>Play the gifting game</h2>
          <h3>Shop gaming</h3>
        </div>
      </div>
      <div class="full-width-product">
        <img src="./assets/images/img_10.png" alt="" />
        <div class="inline-title text-center">
          <h2>The sound of cheer</h2>
          <h3>Shop Audio &amp; Accessories</h3>
        </div>
      </div>
    </main>
    <footer>
      <div class="backtop text-center secondary-bg-color"><a href="#top-site">Back to top</a></div>
      <div class="footer-wrap text-center bg-color-hf">
        <img src="./assets/images/logo.png" alt="logo Amazon" />
      </div>
    </footer>
  </body>
</html>
